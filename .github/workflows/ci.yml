name: Build CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build:
    name: Build and Verify
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore NuGet packages
        run: dotnet restore CyberBot.csproj
      - name: Build (Release)
        run: |
          dotnet build CyberBot.csproj --configuration Release
      - name: Confirm build artifact exists
        run: |
          $targetPath = "bin/Release/net8.0-windows"
          if (Test-Path $targetPath) {
            if ((Test-Path "$targetPath/CyberBot.exe") -or (Test-Path "$targetPath/CyberBot.dll")) {
              Write-Host "✅ Build successful."
            } else {
              Write-Error "❌ Build artifact not found!"
              exit 1
            }
          }
        shell: pwsh
